name: CI/CD Pipeline

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar testes
        run: PYTHONPATH=. pytest

      - name: Alerta de sucesso
        run: echo "Alerta enviado. Pipeline executado com sucesso"
